<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PaguSoft</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .logo {
      width: 120px;
      height: 120px;
      margin-bottom: 28px;
    }

    .wordmark {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #e5e5e5;
      margin-bottom: 10px;
    }

    .tagline {
      font-size: 1rem;
      color: #a3a3a3;
      margin-bottom: 56px;
      font-weight: 400;
    }

    .wip-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #34D399;
      margin-bottom: 12px;
    }

    .wip-heading {
      font-size: 1.5rem;
      font-weight: 500;
      color: #525252;
      letter-spacing: -0.01em;
    }

    footer {
      position: fixed;
      bottom: 24px;
      font-size: 0.75rem;
      color: #404040;
    }

    footer a {
      color: #525252;
      text-decoration: none;
    }

    footer a:hover {
      color: #a3a3a3;
    }
  </style>
</head>
<body>

  <img src="/assets/pagusoft_logo_final.svg" alt="PaguSoft logo" class="logo">
  <p class="wordmark">PaguSoft</p>
  <p class="tagline">Practical, safe, and intuitive tools.</p>

  <p class="wip-label">Coming soon</p>
  <p class="wip-heading">Work in progress</p>

  <footer>
    <a href="/solotuner/privacy/">SoloTuner Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="/solotuner/terms/">SoloTuner Terms of Service</a>
  </footer>

</body>
</html>
